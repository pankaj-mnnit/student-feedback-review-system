{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100" style="background: var(--bg-page);">
    <div class="text-center fade-in-up">
        <h1 class="display-1 fw-bold text-primary mb-0">404</h1>
        <h2 class="h4 text-dark fw-semibold mb-3">Page Not Found</h2>
        <p class="text-muted mb-4 max-w-sm mx-auto">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary px-4 py-2 rounded-pill shadow-sm">
            <i class="bi bi-house-door me-2"></i>Back to Home
        </a>
    </div>
</div>
{% endblock %}
