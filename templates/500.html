{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100" style="background: var(--bg-page);">
    <div class="text-center fade-in-up">
        <h1 class="display-1 fw-bold text-danger mb-0">500</h1>
        <h2 class="h4 text-dark fw-semibold mb-3">Internal Server Error</h2>
        <p class="text-muted mb-4 max-w-sm mx-auto">Oops! Something went wrong on our end. Please try again later or contact support if the issue persists.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary px-4 py-2 rounded-pill shadow-sm">
            <i class="bi bi-arrow-clockwise me-2"></i>Return Home
        </a>
    </div>
</div>
{% endblock %}
